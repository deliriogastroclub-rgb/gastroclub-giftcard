<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f8f9fa;
font-family:Georgia, serif;
display:flex;
justify-content:center;
padding:20px;
}

.wrapper{
width:100%;
max-width:1100px;
display:flex;
gap:30px;
flex-wrap:wrap;
justify-content:center;
align-items:flex-start;
}

.panel{
width:320px;
background:white;
padding:24px;
border-radius:18px;
box-shadow:0 8px 30px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
gap:18px;
}

.panel h2{
font-size:20px;
color:#212529;
margin-bottom:8px;
}

label{
display:flex;
flex-direction:column;
gap:6px;
font-size:13px;
color:#212529;
font-weight:600;
}

input, textarea, select{
padding:12px;
border:1px solid #ddd;
border-radius:10px;
font-family:inherit;
font-size:14px;
}

textarea{
min-height:90px;
resize:none;
}

.price-box{
background:#212529;
color:white;
padding:18px;
border-radius:14px;
text-align:center;
}

.price-box small{
display:block;
opacity:0.7;
margin-bottom:6px;
}

.price{
font-size:32px;
font-weight:bold;
color:#c59e47;
}

.buy-btn{
background:#c59e47;
color:white;
border:none;
padding:16px;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

.buy-btn:hover{
opacity:.9;
}

.card{
width:620px;
border-radius:22px;
overflow:hidden;
background:#212529;
position:relative;
color:white;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

.card-inner{
padding:40px;
position:relative;
z-index:2;
}

.gold{
color:#c59e47;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:60px;
}

.brand{
font-size:28px;
letter-spacing:4px;
font-weight:bold;
}

.badge{
background:#c59e47;
padding:8px 18px;
border-radius:30px;
font-size:11px;
font-weight:bold;
color:#212529;
letter-spacing:2px;
}

.people{
font-size:78px;
font-weight:bold;
line-height:1;
}

.people-text{
font-size:18px;
opacity:0.8;
margin-bottom:25px;
}

.message{
font-style:italic;
max-width:420px;
line-height:1.6;
opacity:0.85;
margin-bottom:50px;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:flex-end;
margin-top:50px;
}

.label{
font-size:11px;
letter-spacing:2px;
opacity:0.7;
margin-bottom:8px;
}

.name{
font-size:26px;
font-weight:bold;
}

.footer{
border-top:1px solid rgba(255,255,255,0.1);
padding:18px 40px;
font-size:12px;
display:flex;
justify-content:space-between;
opacity:0.7;
}

.bg{
position:absolute;
inset:0;
background:
radial-gradient(circle at top right, rgba(197,158,71,0.18), transparent 35%),
radial-gradient(circle at bottom left, rgba(197,158,71,0.12), transparent 30%);
}

@media(max-width:900px){

.card{
width:100%;
}

.panel{
width:100%;
}

.people{
font-size:56px;
}

}
</style>
</head>

<body>

<div class="wrapper">

<div class="panel">

<h2>Gift Card Gastroclub</h2>

<label>
Para
<input type="text" id="recipient" placeholder="Nombre destinatario">
</label>

<label>
De parte de
<input type="text" id="sender" placeholder="Tu nombre">
</label>

<label>
Mensaje
<textarea id="message">Una experiencia gastronómica única para disfrutar en Gastroclub.</textarea>
</label>

<label>
Cantidad de personas
<select id="people">
<option value="1">1 Persona</option>
<option value="2">2 Personas</option>
<option value="3">3 Personas</option>
<option value="4">4 Personas</option>
</select>
</label>

<div class="price-box">
<small>Precio Total</small>
<div class="price" id="price">$55.000</div>
</div>

<button class="buy-btn">
Comprar Gift Card
</button>

</div>

<div class="card">

<div class="bg"></div>

<div class="card-inner">

<div class="top">
<div class="brand">GASTROCLUB</div>
<div class="badge">GIFT CARD</div>
</div>

<div class="gold people" id="cardPeople">1</div>
<div class="people-text">PERSONA</div>

<div class="message" id="cardMessage">
Una experiencia gastronómica única para disfrutar en Gastroclub.
</div>

<div class="bottom">

<div>
<div class="label">PARA</div>
<div class="name" id="cardRecipient">Nombre</div>
</div>

<div style="text-align:right;">
<div class="label">DE PARTE DE</div>
<div id="cardSender">Tu nombre</div>
</div>

</div>

</div>

<div class="footer">
<div id="expiry"></div>
<div>Gift Card Gastroclub</div>
</div>

</div>

</div>

<script>

const PRICE_PER_PERSON = 55000;

const recipient = document.getElementById('recipient');
const sender = document.getElementById('sender');
const message = document.getElementById('message');
const people = document.getElementById('people');

function formatPrice(value){
return '$' + value.toLocaleString('es-CL');
}

function getExpiryDate(){

const today = new Date();

today.setMonth(today.getMonth() + 3);

return today.toLocaleDateString('es-CL');

}

function updateCard(){

const qty = parseInt(people.value);

const total = qty * PRICE_PER_PERSON;

document.getElementById('price').innerText = formatPrice(total);

document.getElementById('cardPeople').innerText = qty;

document.querySelector('.people-text').innerText =
qty === 1 ? 'PERSONA' : 'PERSONAS';

document.getElementById('cardRecipient').innerText =
recipient.value || 'Nombre';

document.getElementById('cardSender').innerText =
sender.value || 'Tu nombre';

document.getElementById('cardMessage').innerText =
message.value;

document.getElementById('expiry').innerText =
'Válida hasta: ' + getExpiryDate();

}

recipient.addEventListener('input', updateCard);
sender.addEventListener('input', updateCard);
message.addEventListener('input', updateCard);
people.addEventListener('change', updateCard);

updateCard();

</script>

</body>
</html>
